name: Android CI

# Option B — builds the debug APK and compiles/lints the release variant on a
# clean GitHub runner WITHOUT any signing secrets. The rotated upload keystore
# stays local; release signing is done on the developer machine, not in CI.
#
# This proves the code compiles (debug + release Kotlin), R8/ProGuard rules are
# valid (lintRelease), and the release variant builds up to the signing step —
# without putting the keystore or its passwords into GitHub secret storage.
#
# `local.properties` is gitignored and absent on the runner; build.gradle.kts
# already falls back to a default BASE_URL and guards the signing block on
# RELEASE_STORE_FILE != null, so the release *compile/lint* tasks run unsigned.
# (assembleRelease, which would need the keystore, is intentionally NOT run here.)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Android app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew clean assembleDebug

      - name: Compile release Kotlin
        run: ./gradlew :app:compileReleaseKotlin

      - name: Lint release variant (R8/ProGuard rules)
        run: ./gradlew :app:lintRelease
